name: Delete S3 Medallion Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm_delete:
        description: 'Type "DELETE" to confirm stack teardown'
        required: true
        default: "NO"

jobs:
  delete-stack:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Empty S3 Bucket (Required before deletion)
        run: |
          BUCKET_NAME=$(aws cloudformation describe-stacks --stack-name sentinel-s3-stack --query "Stacks[0].Outputs[?OutputKey=='DataLakeBucketName'].OutputValue" --output text)
          if [ ! -z "$BUCKET_NAME" ]; then
            echo "Emptying bucket: $BUCKET_NAME"
            aws s3 rm s3://$BUCKET_NAME --recursive
          fi

      - name: Delete CloudFormation Stack
        run: |
          aws cloudformation delete-stack --stack-name sentinel-s3-stack
          echo "Waiting for stack deletion..."
          aws cloudformation wait stack-delete-complete --stack-name sentinel-s3-stack
